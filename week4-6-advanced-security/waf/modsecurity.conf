# ModSecurity WAF Configuration 
SecRuleEngine On 
SecRequestBodyAccess On 
 
# SQL Injection Protection 
SecRule ARGS "@detectSQLi" "id:1001,phase:2,deny,status:403,msg:'SQL Injection blocked'" 
 
# XSS Protection 
SecRule ARGS "@detectXSS" "id:1002,phase:2,deny,status:403,msg:'XSS blocked'" 
 
# Rate Limiting 
SecRule IP:REQUEST_COUNT "@gt 100" "id:1003,phase:1,deny,status:429,msg:'Rate limit exceeded'" 
